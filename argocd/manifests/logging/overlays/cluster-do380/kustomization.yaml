apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../channel-6.1/common_patches

patches:
  - target:
      group: operators.coreos.com
      version: v1alpha1
      kind: Subscription
      name: cluster-logging
      namespace: openshift-logging
    patch: |-
      - op: replace
        path: /spec/source
        value: "gls-catalog-cs"
